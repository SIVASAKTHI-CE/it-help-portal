server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Root → redirect to login
    location = / {
        auth_basic off;
        return 302 /login.html;
    }

    # ALL html pages — no browser popup
    # Login page handles auth via JS
    location = /login.html {
        auth_basic off;
        try_files $uri =404;
    }
    location = /index.html {
        auth_basic off;
        try_files $uri =404;
    }
    location = /packages.html {
        auth_basic off;
        try_files $uri =404;
    }
    location = /scripts.html {
        auth_basic off;
        try_files $uri =404;
    }
    location = /commands.html {
        auth_basic off;
        try_files $uri =404;
    }
    location = /favicon.ico {
        auth_basic off;
        return 204;
    }

    # Auth check endpoints — used by login.html JS only
    location = /auth-check {
        auth_basic "IT Help Portal";
        auth_basic_user_file /etc/nginx/.htpasswd_user;
        add_header Content-Type text/plain;
        add_header Cache-Control no-store;
        return 200 "ok";
    }
    location = /auth-check-admin {
        auth_basic "Admin";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;
        add_header Content-Type text/plain;
        add_header Cache-Control no-store;
        return 200 "ok";
    }

    # AI proxy — no auth
    location /api/ {
        auth_basic off;
        proxy_pass http://host.docker.internal:8001/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Static assets — no auth
    location ~* \.(css|js|png|jpg|ico|svg|woff|woff2)$ {
        auth_basic off;
        try_files $uri =404;
    }

    # packages and scripts folders
    location /packages/ {
        auth_basic off;
        try_files $uri =404;
    }
    location /scripts/ {
        auth_basic off;
        try_files $uri =404;
    }
}
