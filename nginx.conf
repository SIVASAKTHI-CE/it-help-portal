server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Redirect root to login page WITHOUT triggering auth
    location = / {
        auth_basic off;
        return 302 /login.html;
    }

    # All public pages - no auth
    location = /login.html {
        auth_basic off;
        try_files $uri =404;
    }
    location = /favicon.ico {
        auth_basic off;
        return 204;
    }

    # Auth check endpoints for login page JS
    location = /auth-check {
        auth_basic "IT Help Portal";
        auth_basic_user_file /etc/nginx/.htpasswd_user;
        add_header Content-Type text/plain;
        return 200 "ok";
    }
    location = /auth-check-admin {
        auth_basic "Admin";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # AI proxy - no auth
    location /api/ {
        auth_basic off;
        proxy_pass http://host.docker.internal:8001/;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Static files - auth required
    location / {
        auth_basic "IT Help Portal";
        auth_basic_user_file /etc/nginx/.htpasswd_user;
        try_files $uri $uri/ /index.html;
    }
}
