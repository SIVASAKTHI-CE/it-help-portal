version: '3.8'
services:
  portal:
    build: .
    container_name: it-help-portal
    restart: always
    ports:
      - "8080:80"
    networks:
      - portal-net
  ai-backend:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: it-ai-backend
    restart: always
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    networks:
      - portal-net
networks:
  portal-net:
    driver: bridge