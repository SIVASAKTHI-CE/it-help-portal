<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Help Portal — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0A0E17;
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
/* Animated grid background */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;
  animation:grid 20s linear infinite;
  pointer-events:none;
}
@keyframes grid{0%{transform:translateY(0)}100%{transform:translateY(40px)}}

.login-wrap{
  position:relative;
  width:100%;
  max-width:420px;
  padding:24px;
}
/* Glow effect behind card */
.login-wrap::before{
  content:'';
  position:absolute;
  inset:-1px;
  background:linear-gradient(135deg,#00F5FF,#9D4EDD,#00F5FF);
  border-radius:16px;
  opacity:0.15;
  filter:blur(20px);
  z-index:0;
}
.login-card{
  position:relative;
  background:#0F1623;
  border:1px solid #1E2D45;
  border-radius:14px;
  padding:40px 36px;
  z-index:1;
}

/* Logo */
.logo-area{text-align:center;margin-bottom:32px;}
.logo-icon{
  width:60px;height:60px;
  border:2px solid #00F5FF;
  border-radius:14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  margin-bottom:14px;
  box-shadow:0 0 20px rgba(0,245,255,0.2);
  background:rgba(0,245,255,0.05);
}
.logo-title{
  font-family:'Courier New',monospace;
  font-size:18px;
  font-weight:700;
  color:#00F5FF;
  letter-spacing:2px;
  display:block;
}
.logo-sub{
  font-size:12px;
  color:#475569;
  margin-top:4px;
  display:block;
}

/* Tabs */
.tabs{
  display:flex;
  background:#161E2E;
  border:1px solid #1E2D45;
  border-radius:8px;
  padding:4px;
  margin-bottom:28px;
  gap:4px;
}
.tab{
  flex:1;padding:8px;border:none;border-radius:6px;
  font-size:12px;font-weight:600;cursor:pointer;
  transition:.2s;background:transparent;color:#475569;
}
.tab.active{background:#00F5FF;color:#0A0E17;}
.tab:not(.active):hover{color:#CBD5E1;}

/* Form */
.field{margin-bottom:18px;}
.field label{
  display:block;
  font-family:'Courier New',monospace;
  font-size:11px;
  color:#475569;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:6px;
}
.field-wrap{position:relative;}
.field-icon{
  position:absolute;left:12px;top:50%;
  transform:translateY(-50%);
  font-size:14px;color:#475569;
}
.field input{
  width:100%;
  background:#0A0E17;
  border:1px solid #1E2D45;
  border-radius:7px;
  padding:11px 12px 11px 36px;
  color:#E2E8F0;
  font-family:'Courier New',monospace;
  font-size:13px;
  transition:.2s;
  outline:none;
}
.field input:focus{
  border-color:#00F5FF;
  box-shadow:0 0 0 3px rgba(0,245,255,0.1);
}
.field input::placeholder{color:#1E2D45;}

/* Error */
.error-msg{
  display:none;
  background:rgba(255,76,76,0.1);
  border:1px solid rgba(255,76,76,0.3);
  border-radius:6px;
  padding:10px 14px;
  font-size:12px;
  color:#FF4C4C;
  margin-bottom:16px;
  font-family:'Courier New',monospace;
}
.error-msg.show{display:block;}

/* Login button */
.btn-login{
  width:100%;
  padding:13px;
  background:linear-gradient(135deg,#00F5FF,#0099CC);
  border:none;
  border-radius:8px;
  color:#0A0E17;
  font-family:'Courier New',monospace;
  font-size:13px;
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  transition:.2s;
  margin-top:4px;
}
.btn-login:hover{
  transform:translateY(-1px);
  box-shadow:0 0 24px rgba(0,245,255,0.4);
}
.btn-login:active{transform:translateY(0);}
.btn-login.admin-mode{
  background:linear-gradient(135deg,#9D4EDD,#6B21A8);
  color:#fff;
}
.btn-login.loading{opacity:0.7;cursor:not-allowed;}

/* Footer note */
.login-footer{
  text-align:center;
  margin-top:20px;
  font-size:11px;
  color:#1E2D45;
  font-family:'Courier New',monospace;
}

/* Status dot */
.status-dot{
  display:inline-block;
  width:6px;height:6px;
  border-radius:50%;
  background:#39FF14;
  box-shadow:0 0 6px #39FF14;
  margin-right:6px;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-icon">⚡</div>
      <span class="logo-title">IT HELP PORTAL</span>
      <span class="logo-sub">
        <span class="status-dot"></span>
        BITLA-ITDESK · Secure Access
      </span>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('user',this)">👤 User Login</button>
      <button class="tab" onclick="switchTab('admin',this)">🔐 Admin Login</button>
    </div>

    <!-- Error message -->
    <div class="error-msg" id="err">❌ Invalid username or password</div>

    <!-- Username -->
    <div class="field">
      <label>Username</label>
      <div class="field-wrap">
        <span class="field-icon">👤</span>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label>Password</label>
      <div class="field-wrap">
        <span class="field-icon">🔑</span>
        <input type="password" id="password" placeholder="Enter password"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>

    <!-- Login Button -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      → SIGN IN
    </button>

    <div class="login-footer">
      🔒 Secured with Nginx Auth · IT Help Portal v2.0
    </div>

  </div>
</div>

<script>
let mode = 'user';

function switchTab(m, el) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const btn = document.getElementById('loginBtn');
  if(m === 'admin') {
    btn.classList.add('admin-mode');
    btn.textContent = '→ ADMIN LOGIN';
    document.getElementById('username').value = 'admin';
  } else {
    btn.classList.remove('admin-mode');
    btn.textContent = '→ SIGN IN';
    document.getElementById('username').value = '';
  }
  document.getElementById('err').classList.remove('show');
}

async function doLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const btn  = document.getElementById('loginBtn');
  const err  = document.getElementById('err');

  if(!user || !pass) {
    err.textContent = '⚠ Please enter username and password';
    err.classList.add('show');
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '⟳ Verifying...';
  err.classList.remove('show');

  // Pick correct endpoint based on tab
  const endpoint = mode === 'admin' ? '/auth-check-admin' : '/auth-check';

  try {
    const resp = await fetch(endpoint, {
      method: 'GET',
      headers: {
        'Authorization': 'Basic ' + btoa(unescape(encodeURIComponent(user + ':' + pass)))
      }
    });

    if(resp.ok) {
      btn.textContent = '✓ Access Granted!';
      btn.style.background = 'linear-gradient(135deg,#39FF14,#22CC00)';
      btn.style.color = '#0A0E17';
      sessionStorage.setItem('auth', btoa(user + ':' + pass));
      sessionStorage.setItem('role', mode);
      sessionStorage.setItem('user', user);
      setTimeout(() => {
        window.location.href = '/index.html';
      }, 800);
    } else {
      err.textContent = '❌ Invalid username or password';
      err.classList.add('show');
      btn.classList.remove('loading');
      btn.style.background = '';
      btn.textContent = mode === 'admin' ? '→ ADMIN LOGIN' : '→ SIGN IN';
    }
  } catch(e) {
    err.textContent = '⚠ Connection error — try again';
    err.classList.add('show');
    btn.classList.remove('loading');
    btn.textContent = '→ SIGN IN';
  }
}
</script>
</body>
</html>
